<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Notations: more books by Harari</title>
	<style>
		body {
			background-color: #121212;
			color: #e0e0e0;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			padding: 2rem;
		}
		h1 {
			color: #ffffff;
			border-bottom: 2px solid #333;
			padding-bottom: 1rem;
		}
		.notations-grid {
			display: grid;
			grid-template-columns: 200px 1fr;
			gap: 0.8rem 2rem;
			align-items: center;
			margin-top: 2rem;
			font-family: 'JetBrains Mono', 'Fira Code', monospace;
			font-size: 1.1rem;
		}
		.label {
			font-weight: bold;
			color: #888;
			text-transform: uppercase;
			font-size: 0.9rem;
			letter-spacing: 0.05rem;
		}
		.value {
			color: #ff8c00; /* Dark Orange */
			background: #1e1e1e;
			padding: 0.4rem 0.8rem;
			border-radius: 4px;
			border-left: 3px solid #ff8c00;
		}
	</style>
</head>
<body>
	<h1>Test Notations for: "more books by Harari"</h1>
	<div class="notations-grid">

		<div class="label">Title Notation:</div>
		<div class="value">More Books By Harari</div>
		<div class="label">Text Notation:</div>
		<div class="value">more books by harari</div>
		<div class="label">Camel Notation:</div>
		<div class="value">moreBooksByHarari</div>
		<div class="label">Pascal Notation:</div>
		<div class="value">MoreBooksByHarari</div>
	</div>
</body>
</html>
